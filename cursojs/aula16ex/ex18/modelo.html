<!DOCTYPE html>
<html lang="pt-br
">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelo de Exercício</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <section>
        <div id="formulario">
            <div id="f1">
                <label for="num">Número (entre 1 a 100): </label>
                <input type="number" name="numero" id="numero">
                <input type="button" value="Adicionar" onclick="add()">
            </div>

            <div id="f2">
                <select name="tabela" id="tabela" size="10">
                    <option>Digite algum valor...</option>
                </select>
                <input type="button" value="Finalizar" onclick="enviar()">
            </div>
            
        </div>
        <div id="resformulario">

        </div>
    </section>
    <footer>
        <p>&copy; Thiago Souza Andrade</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
